<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hiking System</title>
  <style>
    :root{--bg:#0b1220;--card:#111c33;--text:#e8eefc;--muted:#a8b3d6;--accent:#4da3ff;--danger:#ff5c7a;--ok:#2dd4bf;}
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
    body{margin:0;background:linear-gradient(180deg,#0b1220,#070b14);color:var(--text);} 
    .wrap{max-width:1100px;margin:0 auto;padding:28px 16px;}
    header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;}
    .title{display:flex;flex-direction:column;gap:4px;}
    h1{font-size:20px;margin:0;}
    .sub{color:var(--muted);font-size:13px;}
    .row{display:flex;gap:14px;flex-wrap:wrap;}
    .card{background:rgba(17,28,51,.9);border:1px solid rgba(77,163,255,.2);border-radius:14px;padding:16px;flex:1;min-width:280px;}
    .card h2{margin:0 0 10px;font-size:14px;color:var(--muted);font-weight:600;letter-spacing:.3px;text-transform:uppercase;}
    label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px;}
    input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(232,238,252,.14);background:rgba(8,12,22,.4);color:var(--text);outline:none;}
    button{cursor:pointer;border:none;border-radius:12px;padding:11px 12px;background:var(--accent);color:#001025;font-weight:700;}
    button.secondary{background:transparent;color:var(--text);border:1px solid rgba(232,238,252,.2);} 
    button.danger{background:rgba(255,92,122,.12);color:var(--danger);border:1px solid rgba(255,92,122,.35);} 
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;align-items:start;}
    @media(max-width:900px){.grid{grid-template-columns:1fr;}}
    .event{border-top:1px solid rgba(232,238,252,.08);padding-top:12px;margin-top:12px;}
    .event:first-child{border-top:none;padding-top:0;margin-top:0;}
    .event .name{font-weight:800;}
    .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;margin-top:6px;border:1px solid rgba(232,238,252,.18);color:var(--muted);} 
    .badge.approved{border-color:rgba(45,212,191,.4);color:var(--ok);} 
    .badge.pending{border-color:rgba(255,197,64,.45);color:#ffd166;} 
    .msg{margin-top:10px;color:var(--muted);font-size:13px;}
    .error{color:var(--danger)}
    .ok{color:var(--ok)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title">
        <h1>Hiking System</h1>
        <div class="sub">Simple frontend for FastAPI REST APIs</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div style="color:var(--muted);font-size:12px;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="userLabel">Not logged in</div>
        <button class="secondary" id="btnLogout" style="display:none;">Logout</button>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Events</h2>
        <div class="row" style="margin-bottom:10px;">
          <div style="flex:1;min-width:200px;">
            <label>Search</label>
            <input id="q" placeholder="title / location / description" />
          </div>
          <div style="flex:0.5;min-width:160px;">
            <label>Difficulty</label>
            <select id="difficulty">
              <option value="">Any</option>
              <option>Easy</option>
              <option>Moderate</option>
              <option>Hard</option>
              <option>Extreme</option>
            </select>
          </div>
        </div>
        <button id="btnLoadEvents">Load approved events</button>
        <div class="msg" id="eventsMsg"></div>
        <div id="eventsList"></div>
      </div>

      <div>
        <div class="card" style="margin-bottom:14px;">
          <h2>Login</h2>
          <label>Email</label>
          <input id="loginEmail" type="email" />
          <label>Password</label>
          <input id="loginPassword" type="password" />
          <button id="btnLogin" style="width:100%;margin-top:12px;">Login</button>
        </div>

        <div class="card">
          <h2>Register</h2>
          <label>Name</label>
          <input id="regName" />
          <label>Email</label>
          <input id="regEmail" type="email" />
          <label>Password</label>
          <input id="regPassword" type="password" />
          <label>Role</label>
          <select id="regRole">
            <option value="visitor">visitor</option>
            <option value="owner">owner</option>
          </select>
          <button id="btnRegister" style="width:100%;margin-top:12px;">Create account</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let token = localStorage.getItem('token') || '';

    const authHeader = () => token ? { Authorization: 'Bearer ' + token } : {};
    const userLabel = document.getElementById('userLabel');
    const btnLogout = document.getElementById('btnLogout');

    function setLoggedIn(user){
      token = localStorage.getItem('token') || '';
      userLabel.textContent = user ? `Logged in as ${user.email} (${user.role})` : 'Not logged in';
      btnLogout.style.display = token ? 'inline-block' : 'none';
    }

    async function loadMe(){
      if(!token){ setLoggedIn(null); return; }
      const res = await fetch(API_BASE + '/auth/me', { headers: authHeader() });
      if(!res.ok){ localStorage.removeItem('token'); token=''; setLoggedIn(null); return; }
      const data = await res.json();
      setLoggedIn(data);
    }

    async function loadApprovedEvents(){
      const msg = document.getElementById('eventsMsg');
      const list = document.getElementById('eventsList');
      list.innerHTML='';
      msg.textContent='Loading...';

      const q = document.getElementById('q').value.trim();
      const difficulty = document.getElementById('difficulty').value;

      let url = API_BASE + '/events/approved';
      const params = new URLSearchParams();
      if(q) params.set('q', q);
      if(difficulty) params.set('difficulty', difficulty);
      if([...params].length) url += '?' + params.toString();

      // Backend currently does not support q/difficulty on /events/approved,
      // so we fall back to client-side filter if needed.
      const res = await fetch(API_BASE + '/events/approved');
      if(!res.ok){ msg.textContent='Failed to load events'; msg.className='msg error'; return; }
      let events = await res.json();

      if(q){
        const term = q.toLowerCase();
        events = events.filter(e => (e.title||'').toLowerCase().includes(term) || (e.location||'').toLowerCase().includes(term) || (e.description||'').toLowerCase().includes(term));
      }
      if(difficulty){
        events = events.filter(e => e.difficulty === difficulty);
      }

      msg.textContent = `Found ${events.length} approved event(s)`;
      msg.className='msg';

      if(events.length===0){ list.innerHTML='<div class="msg">No events found.</div>'; return; }

      for(const e of events){
        const d = document.createElement('div');
        d.className='event';
        d.innerHTML = `
          <div class="name">${e.title}</div>
          <div class="badge approved">Approved</div>
          <div style="color:var(--muted);font-size:13px;margin-top:6px;">📍 ${e.location} • 💰 ${e.price}</div>
          <div style="color:var(--muted);font-size:13px;margin-top:6px;">🗓 ${new Date(e.event_date).toLocaleDateString()} • ${e.difficulty}</div>
          <div style="color:var(--muted);font-size:13px;margin-top:6px;">${e.description ? e.description : ''}</div>
          <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
            <button data-book="${e.id}" ${token ? '' : 'disabled'}>${token ? 'Book' : 'Login to book'}</button>
          </div>
        `;
        list.appendChild(d);
      }

      list.querySelectorAll('button[data-book]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const eventId = btn.getAttribute('data-book');
          const res = await fetch(API_BASE + '/bookings', {
            method:'POST',
            headers:{ 'Content-Type':'application/json', ...authHeader() },
            body: JSON.stringify({ event_id: Number(eventId) })
          });
          if(!res.ok){
            const t = await res.json().catch(()=>null);
            alert(t?.detail || 'Booking failed');
            return;
          }
          alert('Booked successfully');
        });
      });
    }

    async function login(){
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const res = await fetch(API_BASE + '/auth/login', {
        method:'POST',
        headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username: email, password })
      });
      if(!res.ok){
        const t = await res.json().catch(()=>null);
        alert(t?.detail || 'Login failed');
        return;
      }
      const data = await res.json();
      localStorage.setItem('token', data.access_token);
      token = data.access_token;
      await loadMe();
      await loadApprovedEvents();
    }

    async function register(){
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;

      const res = await fetch(API_BASE + '/auth/register', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });
      if(!res.ok){
        const t = await res.json().catch(()=>null);
        alert(t?.detail || 'Register failed');
        return;
      }
      alert('Account created. Please login.');
    }

    btnLogout.addEventListener('click', async () => {
      localStorage.removeItem('token');
      token='';
      await loadMe();
      await loadApprovedEvents();
    });

    document.getElementById('btnLogin').addEventListener('click', login);
    document.getElementById('btnRegister').addEventListener('click', register);
    document.getElementById('btnLoadEvents').addEventListener('click', loadApprovedEvents);

    loadMe();
    loadApprovedEvents();
  </script>
</body>
</html>
